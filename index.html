<!DOCTYPE html>
<html>
<head>
    <title>AI Career Readiness Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>AI-Powered Career Readiness Assessment Platform</h1>

    <div class="card">
        <h2>Login</h2>
        <input type="email" placeholder="Enter Email"><br><br>
        <input type="password" placeholder="Enter Password"><br><br>
        <button>Login</button>
    </div>

    <div class="card">
        <h2>Assessment</h2>
        <p>Programming Skills</p>
        <select>
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
        </select>
    </div>

    <div class="card">
        <h2>Dashboard</h2>
        <p>Career Readiness Score : 85%</p>
        <p>Recommended Career : Data Analyst</p>
    </div>

</body>
</html>
